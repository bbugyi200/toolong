name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build package
        run: uv build
      - name: Validate package metadata
        run: uvx --from twine twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  install-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install the wheel in a fresh environment
        run: |
          uv venv --python 3.12 /tmp/toolong-smoke
          uv pip install --python /tmp/toolong-smoke/bin/python dist/*.whl
      - name: Exercise the installed CLI
        run: |
          set -euo pipefail

          /tmp/toolong-smoke/bin/toolong --help
          fixture="$(mktemp -d)"
          printf 'fn main() {}\n// 2\n// 3\n// 4\n// 5\n// 6\n' > "${fixture}/large.rs"
          : > "${fixture}/small.py"

          /tmp/toolong-smoke/bin/toolong "${fixture}" 5 3 1 > /tmp/toolong-ok.out 2> /tmp/toolong-ok.err

          status=0
          /tmp/toolong-smoke/bin/toolong --include '*.rs' "${fixture}" 5 3 1 \
            > /tmp/toolong-violation.out 2> /tmp/toolong-violation.err || status=$?
          test "${status}" -eq 1
          grep -Fq "VIOLATION: ${fixture}/large.rs has 6 lines (limit: 5)" /tmp/toolong-violation.err

  publish:
    needs: [release, build, install-smoke]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
